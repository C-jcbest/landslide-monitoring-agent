name: Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  offline-tests:
    name: Offline quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --group test

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright

      - name: Run offline tests with coverage
        run: uv run --group test pytest --cov=app --cov=evals --cov-report=term-missing -m "not integration and not e2e and not live and not slow"
