services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agent_test
      POSTGRES_USER: agent_test
      POSTGRES_PASSWORD: agent_test_password
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_test -d agent_test"]
      interval: 2s
      timeout: 2s
      retries: 30

  valkey:
    image: valkey/valkey:8.1.6-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30

  app:
    build:
      context: .
      args:
        APP_ENV: test
    environment:
      APP_ENV: test
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: agent_test
      POSTGRES_USER: agent_test
      POSTGRES_PASSWORD: agent_test_password
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      LANGFUSE_TRACING_ENABLED: "false"
      SESSION_NAMING_ENABLED: "false"
      JWT_SECRET_KEY: integration-test-key
      DEEPSEEK_API_KEY: test-no-network-key
      NVIDIA_API_KEY: ""
    ports:
      - "58000:8000"
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s
